<!-- PART 1: FONT PROPOSALS                                                     -->
<!-- ═══════════════════════════════════════════════════════════════════════════ -->

<section class="section-wrapper proposal-section">
  <div class="section-header">
    <span class="section-number">01</span>
    <h2 class="section-title">폰트별 상세 분석</h2>
  </div>

  <div class="font-cards-container" id="fontCardsContainer">
    <!-- JavaScript에서 동적으로 생성됨 -->
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════════════════════ -->
<!-- PART 2: COMPARISON & SLIDERS                                              -->
<!-- ═══════════════════════════════════════════════════════════════════════════ -->

<div class="divider-section">
  <div class="divider-content">
    <div>
      <h2 class="divider-title">커스텀 비교</h2>
      <p class="divider-subtitle">굵기 · 크기 · 자간 · 행간을 조정하며 실시간 비교</p>
    </div>
  </div>
</div>

<section class="section-wrapper detail-section">
  <!-- 슬라이더 컨트롤 -->
  <p class="sliders-label">설정 조정</p>
  <div class="sliders-panel">
    <div class="slider-group">
      <label class="slider-label">
        굵기 (Weight)
        <span class="slider-value" id="weightValue">700</span>
      </label>
      <input type="range" id="weightSlider" min="300" max="900" step="100" value="700" class="slider-input">
    </div>

    <div class="slider-group">
      <label class="slider-label">
        크기 (Font-size)
        <span class="slider-value" id="sizeValue">24px</span>
      </label>
      <input type="range" id="sizeSlider" min="12" max="60" step="2" value="24" class="slider-input">
    </div>

    <div class="slider-group">
      <label class="slider-label">
        행간 (Line-height)
        <span class="slider-value" id="leadingValue">1.5</span>
      </label>
      <input type="range" id="leadingSlider" min="1.0" max="2.5" step="0.05" value="1.5" class="slider-input">
    </div>

    <div class="slider-group">
      <label class="slider-label">
        자간 (Letter-spacing)
        <span class="slider-value" id="trackingValue">0.00em</span>
      </label>
      <input type="range" id="trackingSlider" min="-5" max="25" step="1" value="0" class="slider-input">
    </div>
  </div>

  <!-- 실시간 비교 -->
  <div class="comparison-preview" id="comparisonPreview">
    <!-- JavaScript에서 동적으로 생성됨 -->
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════════════════════ -->

  </div>

    <table class="score-table" id="scoreTable">
      <!-- JavaScript에서 동적으로 생성됨 -->
    </table>
  </div>
</section>
