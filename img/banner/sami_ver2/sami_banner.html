<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMI float Banner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f0f2f8;
    }

    .banner-wrap {
      position: fixed;
      bottom: 50px;
      right: 50px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 170px;
      height: 68px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.12s ease 0.1s;
      cursor: pointer;
    }

    .banner-wrap:hover {
      width: 360px;
    }

    .banner-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(72.59% 105.27% at 95.51% 96.38%, #67A8FF 0%, #5066DD 100%);
      border-radius: 999px;
      z-index: 0;
    }

    .banner-text {
      position: absolute;
      left: 22px;
      z-index: 1;
      opacity: 0;
      top: 17px;
      transition: opacity 0.05s ease, transform 0.05s ease;
    }

    .banner-wrap:hover .banner-text {
      opacity: 1;
      transition: opacity 0.2s ease 0.15s, transform 0.2s ease 0.15s;
    }

    .banner-wrap .banner-text img {
      height: 33px;
    }

    .sparkle {
      position: absolute;
      top: 16px;
      right: 120px;
      width: 30px;
      filter: brightness(0) invert(1);
    }

    .sparkle img {
      width: 100%;
    }

    .character {
      position: relative;
      z-index: 2;
      width: 135px;
      height: auto;
      flex-shrink: 0;
      margin-right: 3px;
      bottom: 10px;
    }

    .character img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>

<body>

  <div class="banner-wrap">
    <div class="banner-bg"></div>
    <div class="banner-text">
      <img src="img/banner_txt.svg" alt="">
    </div>
    <div class="sparkle">
      <img src="img/sami_gif_star.gif" alt="별">
    </div>
    <div class="character">
      <img src="img/sami.gif" alt="SAMI 2.0 캐릭터">
    </div>
  </div>

</body>

</html>
